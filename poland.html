<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poland Border Shift: 1939 vs 1945</title>
    <script src="https://unpkg.com/maplibre-gl@^4.0.0/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@^4.0.0/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        .controls {
            position: absolute;
            top: 20px;
            left: 20px;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            z-index: 1;
        }
        button {
            padding: 10px 15px;
            cursor: pointer;
            border: 1px solid #ccc;
            background: #f8f8f8;
            font-weight: bold;
            border-radius: 4px;
        }
        button.active {
            background: #2c3e50;
            color: white;
            border-color: #2c3e50;
        }
        .legend { margin-bottom: 10px; font-size: 14px; }
    </style>
</head>
<body>

<div class="controls">
    <div class="legend"><strong>Toggle Border Era</strong></div>
    <button id="btn1939" class="active" onclick="showEra('1939')">1939 Borders</button>
    <button id="btn1945" onclick="showEra('1945')">1945 Borders</button>
</div>

<div id="map"></div>

<script>
    const map = new maplibregl.Map({
        container: 'map',
        style: 'https://demotiles.maplibre.org/style.json', // Basic grayscale style
        center: [19.145, 52.068], // Center of Poland
        zoom: 5
    });

    map.on('load', () => {
        // 1. ADD 1939 SOURCE & LAYER
        map.addSource('poland1939', {
            type: 'geojson',
            data: './poland_1939.geojson' // REPLACE with your GeoJSON variable or path
        });

        map.addLayer({
            'id': 'layer1939',
            'type': 'line',
            'source': 'poland1939',
            'layout': { 'visibility': 'visible' },
            'paint': {
                'line-color': '#e74c3c', // Red
                'line-width': 3
            }
        });

        // 2. ADD 1945 SOURCE & LAYER
        map.addSource('poland1945', {
            type: 'geojson',
            data: './poland_1945.geojson' // REPLACE with your GeoJSON variable or path
        });

        map.addLayer({
            'id': 'layer1945',
            'type': 'line',
            'source': 'poland1945',
            'layout': { 'visibility': 'none' },
            'paint': {
                'line-color': '#3498db', // Blue
                'line-width': 3,
                'line-dasharray': [2, 1] // Dashed to distinguish if overlapping
            }
        });
    });

    function showEra(era) {
        if (era === '1939') {
            map.setLayoutProperty('layer1939', 'visibility', 'visible');
            map.setLayoutProperty('layer1945', 'visibility', 'none');
            document.getElementById('btn1939').classList.add('active');
            document.getElementById('btn1945').classList.remove('active');
        } else {
            map.setLayoutProperty('layer1939', 'visibility', 'none');
            map.setLayoutProperty('layer1945', 'visibility', 'visible');
            document.getElementById('btn1945').classList.add('active');
            document.getElementById('btn1939').classList.remove('active');
        }
    }
</script>

</body>
</html>
